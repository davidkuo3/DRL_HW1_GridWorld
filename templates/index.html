<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GridWorld Strategy Evaluation</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0e14;
            --card-bg: rgba(255, 255, 255, 0.05);
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --start-color: #2ecc71;
            --end-color: #e74c3c;
            --wall-color: #555555;
            --text-color: #ffffff;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, #1a2a44 0%, #0b0e14 100%);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }

        h1 {
            font-weight: 600;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 2rem;
        }

        .controls {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .grid-panel {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #grid-container {
            display: grid;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .cell {
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 600;
            position: relative;
            overflow: hidden;
            text-align: center;
        }

        .cell:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
        }

        .cell.start { background-color: var(--start-color) !important; color: white; }
        .cell.end { background-color: var(--end-color) !important; color: white; }
        .cell.wall { background-color: var(--wall-color) !important; color: white; }

        .cell .arrow { font-size: 20px; margin-bottom: 2px; }
        .cell .value { font-size: 12px; opacity: 0.9; }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.2s;
            text-align: left;
            position: relative;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary);
        }

        .btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: #0b0e14;
            font-weight: 600;
        }

        .btn-compute {
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            border: none;
            color: white;
            padding: 15px;
            border-radius: 12px;
            font-weight: 600;
            margin-top: 1rem;
            box-shadow: 0 5px 15px rgba(0, 210, 255, 0.3);
        }

        .btn-compute:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            filter: grayscale(1);
        }

        .select-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        select, input {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px;
            border-radius: 8px;
            outline: none;
        }

        .status {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-top: 5px;
        }

        .legend {
            margin-top: 1rem;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            font-size: 0.8rem;
        }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .color-box { width: 12px; height: 12px; border-radius: 3px; }
    </style>
</head>
<body>

    <h1>🌐 GridWorld HW1-2</h1>
    <p style="opacity:0.7; margin-bottom: 2rem;">RL Strategy & Value Evaluation</p>

    <div class="container">
        <div class="grid-panel">
            <div id="grid-container"></div>
        </div>

        <div class="controls">
            <div class="select-group">
                <label>Grid Size (n)</label>
                <input type="number" id="grid-n" min="5" max="9" value="5">
            </div>

            <div class="btn-group">
                <label>Interaction Mode</label>
                <button class="btn active" onclick="setMode('start', this)">🟢 Place Start</button>
                <button class="btn" onclick="setMode('end', this)">🔴 Place End</button>
                <button class="btn" onclick="setMode('wall', this)">⚪ Place Wall</button>
            </div>

            <div class="status" id="status-text">
                Start: Not Set <br>
                End: Not Set <br>
                Walls: 0/3
            </div>

            <button class="btn btn-compute" id="compute-btn" onclick="compute()" disabled>🚀 Evaluate Strategy</button>
            
            <button class="btn" style="border-color: #e74c3c; color: #e74c3c;" onclick="resetGrid()">🔄 Reset</button>

            <div class="legend">
                <div class="legend-item"><div class="color-box" style="background:var(--start-color)"></div> Start</div>
                <div class="legend-item"><div class="color-box" style="background:var(--end-color)"></div> End</div>
                <div class="legend-item"><div class="color-box" style="background:var(--wall-color)"></div> Block</div>
            </div>
        </div>
    </div>

    <script>
        let n = 5;
        let mode = 'start';
        let startPos = null; // {r, c}
        let endPos = null;
        let walls = []; // list of {r, c}
        
        const container = document.getElementById('grid-container');
        const nInput = document.getElementById('grid-n');
        const statusText = document.getElementById('status-text');
        const computeBtn = document.getElementById('compute-btn');

        function initGrid() {
            n = parseInt(nInput.value);
            container.style.gridTemplateColumns = `repeat(${n}, 70px)`;
            container.innerHTML = '';
            startPos = null;
            endPos = null;
            walls = [];
            updateUI();

            for (let r = 0; r < n; r++) {
                for (let c = 0; c < n; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.id = `cell-${r}-${c}`;
                    cell.onclick = () => handleCellClick(r, c);
                    cell.innerText = `(${r},${c})`;
                    container.appendChild(cell);
                }
            }
        }

        function setMode(newMode, btn) {
            mode = newMode;
            document.querySelectorAll('.btn-group .btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function handleCellClick(r, c) {
            const cell = document.getElementById(`cell-${r}-${c}`);
            
            // Remove previous markers
            if (startPos && startPos.r === r && startPos.c === c) startPos = null;
            if (endPos && endPos.r === r && endPos.c === c) endPos = null;
            walls = walls.filter(w => w.r !== r || w.c !== c);

            if (mode === 'start') {
                startPos = {r, c};
            } else if (mode === 'end') {
                endPos = {r, c};
            } else if (mode === 'wall') {
                if (walls.length < (n - 2)) {
                    walls.push({r, c});
                } else {
                    alert(`Max walls reached: ${n-2}`);
                }
            }
            updateGrid();
            updateUI();
        }

        function updateGrid() {
            document.querySelectorAll('.cell').forEach(cell => {
                cell.className = 'cell';
                const id = cell.id.split('-').map(Number);
                const r = id[1], c = id[2];
                cell.innerHTML = `(${r},${c})`;
                
                if (startPos && startPos.r === r && startPos.c === c) {
                    cell.classList.add('start');
                    cell.innerHTML = 'START';
                }
                if (endPos && endPos.r === r && endPos.c === c) {
                    cell.classList.add('end');
                    cell.innerHTML = 'END';
                }
                if (walls.some(w => w.r === r && w.c === c)) {
                    cell.classList.add('wall');
                    cell.innerHTML = 'WALL';
                }
            });
        }

        function updateUI() {
            const maxWalls = n - 2;
            statusText.innerHTML = `
                Start: ${startPos ? `(${startPos.r}, ${startPos.c})` : 'Not Set'} <br>
                End: ${endPos ? `(${endPos.r}, ${endPos.c})` : 'Not Set'} <br>
                Walls: ${walls.length}/${maxWalls}
            `;
            
            // Now allows evaluation even with 0 walls (as long as Start and End are set)
            computeBtn.disabled = !(startPos && endPos);
        }

        function resetGrid() {
            initGrid();
        }

        async function compute() {
            const payload = {
                n: n,
                start: [startPos.r, startPos.c],
                end: [endPos.r, endPos.c],
                obstacles: walls.map(w => [w.r, w.c])
            };

            const response = await fetch('/compute', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            const data = await response.json();
            displayResults(data);
        }

        function displayResults(data) {
            const arrows = ["↑", "↓", "←", "→"];
            for (let r = 0; r < n; r++) {
                for (let c = 0; c < n; c++) {
                    const cell = document.getElementById(`cell-${r}-${c}`);
                    
                    // Skip if it is end/wall (Terminal states or blocked)
                    // The start node (Green) will now display its strategy arrow and value
                    if (cell.classList.contains('end') || cell.classList.contains('wall')) {
                        continue;
                    }

                    const val = data.values[r][c];
                    const act = data.policy[r][c];
                    
                    cell.innerHTML = `
                        <div class="arrow">${arrows[act]}</div>
                        <div class="value">${val.toFixed(2)}</div>
                    `;
                }
            }
        }

        nInput.onchange = initGrid;
        initGrid();
    </script>
</body>
</html>
